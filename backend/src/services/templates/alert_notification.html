<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>High Risk Alert</title>
  </head>
  <body style="margin:0;padding:0;background:#fff7ed;font-family:Arial,sans-serif;color:#111827;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #fed7aa;border-radius:12px;padding:24px;">
            <tr>
              <td>
                <h2 style="margin:0 0 12px;font-size:22px;color:#9a3412;">High Risk Churn Alert</h2>
                <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#374151;">
                  A customer has been scored as high risk and needs retention attention.
                </p>
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;">
                  <tr><td style="padding:8px 0;color:#6b7280;font-size:13px;">Customer</td><td align="right" style="padding:8px 0;font-size:14px;font-weight:600;color:#111827;">{{CUSTOMER_NAME}}</td></tr>
                  <tr><td style="padding:8px 0;color:#6b7280;font-size:13px;">Risk level</td><td align="right" style="padding:8px 0;font-size:14px;font-weight:600;color:#b91c1c;">{{RISK_LEVEL}}</td></tr>
                  <tr><td style="padding:8px 0;color:#6b7280;font-size:13px;">Churn probability</td><td align="right" style="padding:8px 0;font-size:14px;font-weight:600;color:#111827;">{{CHURN_PROBABILITY}}</td></tr>
                  <tr><td style="padding:8px 0;color:#6b7280;font-size:13px;">Prediction</td><td align="right" style="padding:8px 0;font-size:14px;font-weight:600;color:#111827;">{{PREDICTION}}</td></tr>
                  <tr><td style="padding:8px 0;color:#6b7280;font-size:13px;">Generated at</td><td align="right" style="padding:8px 0;font-size:14px;font-weight:600;color:#111827;">{{GENERATED_AT}}</td></tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
