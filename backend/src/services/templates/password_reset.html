<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Reset</title>
  </head>
  <body style="margin:0;padding:0;background:#f8fafc;font-family:Arial,sans-serif;color:#111827;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;padding:24px;">
            <tr>
              <td>
                <h2 style="margin:0 0 12px;font-size:22px;color:#111827;">Password Reset Request</h2>
                <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#374151;">
                  We received a request to reset the password for your Churn Insights account.
                </p>
                <p style="margin:0 0 8px;font-size:13px;color:#6b7280;">Your reset code</p>
                <div style="display:inline-block;font-size:28px;letter-spacing:0.3em;font-weight:700;color:#1a56ff;background:#eef4ff;border:1px solid #c7d7ff;border-radius:10px;padding:12px 18px;">
                  {{RESET_CODE}}
                </div>
                <p style="margin:16px 0 0;font-size:14px;color:#374151;">
                  This code expires in <strong>{{EXPIRY_MINUTES}} minutes</strong>.
                </p>
                <p style="margin:20px 0 0;font-size:13px;line-height:1.6;color:#6b7280;">
                  Security notice: If you did not request this reset, ignore this email and consider changing your password.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
