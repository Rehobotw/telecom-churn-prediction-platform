services:
  ml-service:
    build:
      context: ./ml-service
    environment:
      ML_CORS_ORIGINS: http://localhost,http://localhost:80,http://frontend
    ports:
      - "8000:8000"

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 3000
      ML_SERVICE_URL: http://ml-service:8000
      CORS_ORIGIN: http://localhost
      UPLOADS_DIR: /app/uploads
      MAX_UPLOAD_SIZE_BYTES: 10485760
    depends_on:
      - ml-service
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"
