services:
  ml-service:
    build:
      context: ./ml-service
    environment:
      ML_CORS_ORIGINS: ${ML_CORS_ORIGINS:-http://localhost,http://localhost:80,http://frontend}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).getcode()==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "8000:8000"

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml-service:8000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      UPLOADS_DIR: /app/uploads
      MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-10485760}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@gmail.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      AUTH_SECRET: ${AUTH_SECRET:-change-this-session-secret}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USERNAME: ${EMAIL_USERNAME:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_SECURE: ${EMAIL_SECURE:-false}
      EMAIL_TLS_REJECT_UNAUTHORIZED: ${EMAIL_TLS_REJECT_UNAUTHORIZED:-true}
      EMAIL_RETRY_ATTEMPTS: ${EMAIL_RETRY_ATTEMPTS:-2}
      EMAIL_TIMEOUT_MS: ${EMAIL_TIMEOUT_MS:-10000}
      EXPOSE_RESET_CODE_IN_RESPONSE: ${EXPOSE_RESET_CODE_IN_RESPONSE:-false}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost}
      RESET_LINK_PATH: ${RESET_LINK_PATH:-/login}
      RESET_CODE_TTL_MINUTES: ${RESET_CODE_TTL_MINUTES:-15}
      RESET_REQUEST_WINDOW_MS: ${RESET_REQUEST_WINDOW_MS:-900000}
      RESET_REQUEST_MAX_ATTEMPTS: ${RESET_REQUEST_MAX_ATTEMPTS:-5}
      HIGH_RISK_THRESHOLD: ${HIGH_RISK_THRESHOLD:-0.67}
    depends_on:
      ml-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - backend-data:/app/src/data
      - backend-uploads:/app/uploads
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "80:8080"

volumes:
  backend-data:
  backend-uploads:
